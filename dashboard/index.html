<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Harris County Motivated Seller Leads</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --accent: #4f7cff;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --font: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header h1 span { color: var(--accent); }
  #meta { font-size: 12px; color: var(--muted); }

  .stats {
    display: flex;
    gap: 12px;
    padding: 16px 24px;
    flex-wrap: wrap;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 18px;
    min-width: 120px;
  }
  .stat .val { font-size: 24px; font-weight: 700; }
  .stat .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .controls {
    padding: 0 24px 12px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  input[type=text], select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 7px 12px;
    font-size: 13px;
    outline: none;
  }
  input[type=text]:focus, select:focus { border-color: var(--accent); }
  input[type=text] { width: 240px; }
  button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 7px 16px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
  }
  button:hover { opacity: 0.88; }
  #dlBtn { background: #16a34a; }

  .table-wrap {
    padding: 0 24px 32px;
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 12px;
    text-align: left;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
  }
  th:hover { color: var(--text); }
  th.sorted { color: var(--accent); }
  tr:hover td { background: rgba(79,124,255,.05); }
  td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    max-width: 240px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  td.wrap { white-space: normal; }

  .score {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 24px;
    border-radius: 4px;
    font-weight: 700;
    font-size: 13px;
  }
  .score.hi  { background: rgba(34,197,94,.15);  color: var(--green); }
  .score.med { background: rgba(234,179,8,.15);   color: var(--yellow); }
  .score.lo  { background: rgba(239,68,68,.12);   color: var(--red); }

  .flag {
    display: inline-block;
    background: rgba(79,124,255,.15);
    color: #93b4ff;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 11px;
    margin: 1px 2px 1px 0;
    white-space: nowrap;
  }
  .flag.red  { background: rgba(239,68,68,.15);  color: #fca5a5; }
  .flag.yel  { background: rgba(234,179,8,.15);  color: #fde047; }
  .flag.grn  { background: rgba(34,197,94,.15);  color: #86efac; }

  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  #empty {
    text-align: center;
    padding: 48px;
    color: var(--muted);
    display: none;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    background: rgba(79,124,255,.15);
    color: #93b4ff;
  }
</style>
</head>
<body>

<header>
  <h1>Harris County <span>Motivated Seller</span> Leads</h1>
  <div id="meta">Loading…</div>
</header>

<div class="stats">
  <div class="stat"><div class="val" id="sTot">—</div><div class="lbl">Total Leads</div></div>
  <div class="stat"><div class="val" id="sAddr">—</div><div class="lbl">With Address</div></div>
  <div class="stat"><div class="val" id="sHi">—</div><div class="lbl">Score ≥ 70</div></div>
  <div class="stat"><div class="val" id="sRange">—</div><div class="lbl">Date Range</div></div>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="Search owner, doc #, address…" oninput="applyFilters()" />
  <select id="fType" onchange="applyFilters()">
    <option value="">All Doc Types</option>
  </select>
  <select id="fCat" onchange="applyFilters()">
    <option value="">All Categories</option>
    <option value="foreclosure">Foreclosure</option>
    <option value="judgment">Judgment</option>
    <option value="lien">Lien</option>
    <option value="tax">Tax</option>
    <option value="probate">Probate</option>
  </select>
  <select id="fScore" onchange="applyFilters()">
    <option value="0">All Scores</option>
    <option value="70">Score ≥ 70</option>
    <option value="50">Score ≥ 50</option>
  </select>
  <button onclick="resetFilters()">Reset</button>
  <button id="dlBtn" onclick="downloadCSV()">⬇ Download CSV</button>
</div>

<div class="table-wrap">
  <table id="tbl">
    <thead>
      <tr>
        <th onclick="sortBy('score')"     class="sorted">Score ▼</th>
        <th onclick="sortBy('filed')"    >Filed</th>
        <th onclick="sortBy('doc_type')" >Type</th>
        <th onclick="sortBy('owner')"    >Owner / Grantor</th>
        <th onclick="sortBy('amount')"   >Amount</th>
        <th>Property Address</th>
        <th>Mailing Address</th>
        <th>Flags</th>
        <th>Doc #</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty">No records match the current filters.</div>
</div>

<script>
let ALL = [];
let sortCol = 'score';
let sortDir = -1; // -1 = desc

async function load() {
  try {
    const r = await fetch('records.json?_=' + Date.now());
    const data = await r.json();
    ALL = data.records || [];

    document.getElementById('sTot').textContent   = ALL.length.toLocaleString();
    document.getElementById('sAddr').textContent  = ALL.filter(r => r.prop_address).length.toLocaleString();
    document.getElementById('sHi').textContent    = ALL.filter(r => (r.score||0) >= 70).length.toLocaleString();
    document.getElementById('sRange').textContent = `${data.date_range?.from || '—'} → ${data.date_range?.to || '—'}`;

    const fetchedAt = data.fetched_at ? new Date(data.fetched_at).toLocaleString() : '';
    document.getElementById('meta').textContent = fetchedAt ? `Last updated: ${fetchedAt}` : '';

    // Populate type filter
    const types = [...new Set(ALL.map(r => r.doc_type).filter(Boolean))].sort();
    const sel = document.getElementById('fType');
    types.forEach(t => {
      const o = document.createElement('option');
      o.value = t; o.textContent = t;
      sel.appendChild(o);
    });

    applyFilters();
  } catch(e) {
    document.getElementById('meta').textContent = 'No data yet — run the scraper first.';
    document.getElementById('sTot').textContent = '0';
  }
}

function applyFilters() {
  const q     = document.getElementById('search').value.toLowerCase();
  const fType = document.getElementById('fType').value;
  const fCat  = document.getElementById('fCat').value;
  const fSc   = parseInt(document.getElementById('fScore').value) || 0;

  let rows = ALL.filter(r => {
    if (fType && r.doc_type !== fType) return false;
    if (fCat  && r.cat    !== fCat)   return false;
    if (fSc   && (r.score||0) < fSc)  return false;
    if (q) {
      const hay = [r.owner, r.doc_num, r.prop_address, r.grantee, r.legal].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  rows = sortRows(rows);
  render(rows);
}

function sortRows(rows) {
  return [...rows].sort((a, b) => {
    let av = a[sortCol] ?? '', bv = b[sortCol] ?? '';
    if (typeof av === 'number') return (av - bv) * sortDir;
    return String(av).localeCompare(String(bv)) * sortDir;
  });
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = -1; }
  document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
  event.target.classList.add('sorted');
  applyFilters();
}

function scoreClass(s) {
  if (s >= 70) return 'hi';
  if (s >= 50) return 'med';
  return 'lo';
}

function flagClass(f) {
  f = f.toLowerCase();
  if (f.includes('foreclos') || f.includes('pendens')) return 'red';
  if (f.includes('judgment') || f.includes('lien') || f.includes('debt')) return 'yel';
  if (f.includes('address') || f.includes('week')) return 'grn';
  return '';
}

function fmt(val) {
  if (val == null || val === '') return '<span style="color:#475569">—</span>';
  return String(val).replace(/</g,'&lt;');
}

function fmtAmount(a) {
  if (!a) return '—';
  return '$' + Number(a).toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
}

function render(rows) {
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');
  if (!rows.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = rows.map(r => {
    const sc   = r.score || 0;
    const cls  = scoreClass(sc);
    const flags = (r.flags || []).map(f =>
      `<span class="flag ${flagClass(f)}">${fmt(f)}</span>`).join('');
    const propAddr = [r.prop_address, r.prop_city, r.prop_state, r.prop_zip].filter(Boolean).join(', ');
    const mailAddr = [r.mail_address, r.mail_city, r.mail_state, r.mail_zip].filter(Boolean).join(', ');
    const docLink  = r.clerk_url
      ? `<a href="${r.clerk_url}" target="_blank">${fmt(r.doc_num)}</a>`
      : fmt(r.doc_num);

    return `<tr>
      <td><span class="score ${cls}">${sc}</span></td>
      <td>${fmt(r.filed)}</td>
      <td><span class="badge">${fmt(r.doc_type)}</span></td>
      <td title="${fmt(r.owner)}">${fmt(r.owner)}</td>
      <td>${fmtAmount(r.amount)}</td>
      <td title="${propAddr}">${fmt(propAddr) || '—'}</td>
      <td title="${mailAddr}">${fmt(mailAddr) || '—'}</td>
      <td class="wrap">${flags || '—'}</td>
      <td>${docLink}</td>
    </tr>`;
  }).join('');
}

function resetFilters() {
  document.getElementById('search').value = '';
  document.getElementById('fType').value  = '';
  document.getElementById('fCat').value   = '';
  document.getElementById('fScore').value = '0';
  applyFilters();
}

function downloadCSV() {
  const cols = ['score','filed','doc_type','cat_label','owner','grantee','amount',
                'prop_address','prop_city','prop_state','prop_zip',
                'mail_address','mail_city','mail_state','mail_zip',
                'flags','doc_num','clerk_url'];
  const header = cols.join(',');
  const rows = ALL.map(r =>
    cols.map(c => {
      let v = c === 'flags' ? (r.flags||[]).join('; ') : (r[c] ?? '');
      v = String(v).replace(/"/g,'""');
      return `"${v}"`;
    }).join(',')
  );
  const blob = new Blob([header + '\n' + rows.join('\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `harris_leads_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

load();
</script>
</body>
</html>
