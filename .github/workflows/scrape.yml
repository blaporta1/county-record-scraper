name: Scrape Harris County Leads

on:
  schedule:
    # 07:00 UTC daily  (02:00 CT / 03:00 CT during DST)
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Days to look back (default 7)"
        required: false
        default: "7"

# Required for committing results and deploying GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "scrape"
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  scrape:
  # ──────────────────────────────────────────────────────────────────────────
    name: Fetch & enrich leads
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scraper/requirements.txt

      - name: Install Playwright + Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}
          # Override URLs via repository secrets / variables if needed:
          # CLERK_URL:     ${{ vars.CLERK_URL }}
          # HCAD_BULK_URL: ${{ vars.HCAD_BULK_URL }}
        run: python scraper/fetch.py

      - name: Commit updated records
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/records.json data/records.json data/ghl_export.csv
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: leads update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

  # ──────────────────────────────────────────────────────────────────────────
  deploy-pages:
  # ──────────────────────────────────────────────────────────────────────────
    name: Deploy dashboard to GitHub Pages
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main   # pull the freshly committed records.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
